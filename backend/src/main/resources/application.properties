spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/energyforecast
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
server.error.include-message=always
spring.mvc.problemdetails.enabled=false

# kafka

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=energyforecast-group-v2
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.energyforecast.backend.domain
spring.kafka.consumer.properties.spring.json.value.default.type=com.energyforecast.backend.domain.EnergyReading
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
logging.level.org.springframework.kafka=DEBUG
spring.kafka.consumer.bootstrap-servers=localhost:29092

#ML service
ml-service.base-url=http://localhost:8000
